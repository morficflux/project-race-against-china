<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎙️ Milton's Recording Booth</title>
    <style>
      body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 28px;
        background: #87ceeb; font-family: system-ui, sans-serif; color: #1b1b24;
        text-align: center; padding: 24px; box-sizing: border-box;
      }
      h1 { margin: 0; font-size: 2.2rem; }
      .chips { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
      .chip {
        font-size: 1.5rem; padding: 14px 26px; border-radius: 999px;
        border: 4px solid #1b1b24; background: #fff; cursor: pointer;
      }
      .chip.active { background: #ffd94d; }
      #record {
        width: 160px; height: 160px; border-radius: 50%; border: 8px solid #1b1b24;
        background: #d93a3a; color: #fff; font-size: 1.6rem; font-weight: bold;
        cursor: pointer; transition: transform 0.1s;
      }
      #record:active { transform: scale(0.94); }
      #record.recording { background: #1b1b24; animation: pulse 1s infinite; }
      @keyframes pulse { 50% { box-shadow: 0 0 0 24px rgba(217, 58, 58, 0.35); } }
      #save {
        font-size: 1.4rem; padding: 14px 30px; border-radius: 14px;
        border: 4px solid #1b1b24; background: #3d8c40; color: #fff; cursor: pointer;
      }
      #save[disabled] { opacity: 0.35; cursor: default; }
      audio { width: min(420px, 90vw); }
      .dad { font-size: 0.95rem; opacity: 0.75; max-width: 460px; }
      #status { font-size: 1.3rem; min-height: 1.6em; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>🎙️ Milton's Recording Booth</h1>

    <div class="chips">
      <button class="chip active" data-name="engine">🏎️ engine</button>
      <button class="chip" data-name="crash">💥 crash</button>
      <button class="chip" data-name="win">🏆 win</button>
      <button class="chip" data-name="pickup">⭐ pickup</button>
      <button class="chip" data-name="boost">🚀 boost</button>
    </div>

    <button id="record">RECORD</button>
    <div id="status">pick a sound, then press the red button!</div>
    <audio id="playback" controls hidden></audio>
    <button id="save" disabled>⬇️ save engine</button>

    <p class="dad">
      Dad step: move the downloaded file from Downloads into
      <code>public/audio/</code> in the game folder, then refresh the game.
      The engine sound loops — one long steady BRRRRM works best!
    </p>

    <script>
      let name = 'engine';
      let recorder = null;
      let blob = null;

      const $ = (id) => document.getElementById(id);
      const status = (t) => ($('status').textContent = t);

      document.querySelectorAll('.chip').forEach((chip) =>
        chip.addEventListener('click', () => {
          document.querySelectorAll('.chip').forEach((c) => c.classList.remove('active'));
          chip.classList.add('active');
          name = chip.dataset.name;
          $('save').textContent = '⬇️ save ' + name;
        }),
      );

      $('record').addEventListener('click', async () => {
        if (recorder && recorder.state === 'recording') {
          recorder.stop();
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const chunks = [];
          recorder = new MediaRecorder(stream);
          recorder.ondataavailable = (e) => chunks.push(e.data);
          recorder.onstop = () => {
            stream.getTracks().forEach((t) => t.stop());
            blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
            const url = URL.createObjectURL(blob);
            $('playback').src = url;
            $('playback').hidden = false;
            $('save').disabled = false;
            $('record').classList.remove('recording');
            $('record').textContent = 'RECORD';
            status('listen — good one? save it! or record again');
          };
          recorder.start();
          $('record').classList.add('recording');
          $('record').textContent = 'STOP';
          status('🔴 recording… make the ' + name + ' sound!');
        } catch (err) {
          status('microphone said no 😢 — check permissions');
        }
      });

      $('save').addEventListener('click', () => {
        if (!blob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name + '.webm';
        a.click();
        status('saved ' + name + '.webm — Dad, do your step!');
      });
    </script>
  </body>
</html>
